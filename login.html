<!DOCTYPE html>
<html lang="en">
<head>
         <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta charset="UTF-8">
    <title>Login | PrepPace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <h1 class="text-3xl font-bold text-blue-600 mb-2">PrepPace</h1>
        <p class="text-slate-500 mb-8">Sign in to track your test progress.</p>

        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold mb-1">Email Address</label>
                <input type="email" id="email" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-bold mb-1">Password</label>
                <input type="password" id="password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Login</button>
            <button onclick="handleSignup()" class="w-full border border-slate-300 py-3 rounded-lg font-bold hover:bg-slate-50 transition">Create Account</button>
        </div>
        
        <p id="message" class="mt-4 text-sm text-center text-red-500"></p>
    </div>

    <script>
        // Initialize Supabase
        const SUPABASE_URL = "https://saqbtjzxdrfpwrcpgdxu.supabase.co";
        const SUPABASE_KEY = "sb_publishable_AsjwUC2XUzvDk1p0HYhyxA_8-RpYaOP";
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });

            if (error) {
                document.getElementById('message').innerText = error.message;
            } else {
                window.location.href = "index.html"; // Redirect to dashboard
            }
        }

        async function handleSignup() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { data, error } = await supabase.auth.signUp({ email, password });

            if (error) {
                document.getElementById('message').innerText = error.message;
            } else {
                document.getElementById('message').className = "mt-4 text-sm text-center text-green-600";
                document.getElementById('message').innerText = "Check your email for the confirmation link!";
            }
        }

    </script>
            
</body>
</html>
